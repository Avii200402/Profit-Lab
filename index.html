<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"><title>PROFIT LAB</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"><link rel="stylesheet" href="style.css"></head><body class="dark-mode"><div class="phone-frame"><div class="card"><div class="header-row"><div class="logo"><h1>PROFIT LAB</h1><div class="steps"><span class="circle">1</span> Analyze <span class="circle">2</span> Manage <span class="circle">3</span> Profit </div></div><div class="clear-btn" id="clearAllBtn"><i class="fas fa-eraser"></i> Clear </div></div><div class="input-grid"><div class="input-row"><label><i class="fas fa-wallet"></i> Account ($)</label><div class="input-wrapper"><input type="text" id="account" placeholder="0.00" oninput="fixDecimal(this); hideResults()" inputmode="decimal"></div></div><div class="input-row"><label><i class="fas fa-coins"></i> Margin ($)</label><div class="input-wrapper"><input type="text" id="margin" placeholder="0.00" oninput="fixDecimal(this); hideResults()" inputmode="decimal"></div></div><div class="input-row"><label><i class="fas fa-shield"></i> Stop loss %</label><div class="input-wrapper"><input type="text" id="stopLoss" placeholder="0.0" oninput="fixDecimal(this); hideResults()" inputmode="decimal"></div></div><div class="input-row"><label><i class="fas fa-sign-in-alt"></i> Entry ($)</label><div class="input-wrapper"><input type="text" id="entryPrice" placeholder="0.00" oninput="fixDecimal(this); hideResults()" inputmode="decimal"></div></div><div class="input-row"><label><i class="fas fa-flag-checkered"></i> Take profit ($)</label><div class="input-wrapper"><input type="text" id="tpPrice" placeholder="0.00" oninput="fixDecimal(this); hideResults()" inputmode="decimal"></div></div></div><div class="type-switch"><div class="type-btn long active" id="longBtn" onclick="chooseType('long'); hideResults()"><i class="fas fa-arrow-up"></i> LONG</div><div class="type-btn short" id="shortBtn" onclick="chooseType('short'); hideResults()"><i class="fas fa-arrow-down"></i> SHORT</div></div><button class="calc-btn" id="computeBtn" onclick="handleComputeWithAnimation()"><i class="fas fa-calculator"></i><span class="btn-text">COMPUTE</span><div class="spinner"></div></button><div class="result-card" id="resultCard"><div class="result-header" id="toggleResult"><h3><i class="fas fa-chart-simple" style="color: #8a9fff;"></i> live position</h3><div class="collapse-icon"><i class="fas fa-chevron-up" id="collapseIcon"></i></div></div><div class="result-content" id="resultContent"><div id="resultInner"><div class="empty-results"><i class="fas fa-chart-line"></i><p>No results yet...</p></div></div></div></div></div><div style="text-align: center; margin-top: 1rem; color: var(--text-secondary); font-size: 0.7rem; opacity: 0.8;"><i class="fas fa-microchip"></i> Devoloped by Avii · smart liquidation view </div></div><div class="floating-theme" id="floatingThemeBtn"><i class="fas fa-moon" id="floatingIcon"></i></div><script src="script.js"></script></body></html>
